version: "1"

databases:
  - name: sst-db
    databaseName: sst_db
    user: postgres
    plan: free

services:
  - type: web
    name: sst-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sst-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"

  - type: web
    name: sst-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: sst-backend
          property: host
      - key: PORT
        value: "3000"
